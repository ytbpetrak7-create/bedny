<!DOCTYPE html>
<html>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Boxes1</h1>

<button class="open" type="button" id="openBoxButton">otevri</button>
<img id="itemimg">
<p id="itemname"></p>
<div id="chances"></div>

<link rel="stylesheet" href="inventory.css">
<link rel="stylesheet" href="1bed.css">
<style>body{padding:40px;padding-top:20px;} h1{font-size:24px;margin-bottom:10px;}</style>
</body>
<script src="user.js?ver=3"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
}

async function showChances() {
  var result = await getBoxInfo("Boxes1");
  var items = JSON.parse(result);
  var total = items.reduce(function(sum, item) { return sum + item.chance; }, 0);
  var html = '<h3 style="color:#0f0;font-size:14px;margin:5px 0 2px;">Šance:</h3><ul style="color:#fff;font-size:12px;list-style:none;padding:0;margin:0;">';
  items.forEach(function(item) {
    var pct = ((item.chance / total) * 100).toFixed(1);
    var odds = Math.round(total / item.chance);
    html += '<li style="padding:1px 0;">' + item.name + ': ' + pct + '% (1 z ' + odds + ')</li>';
  });
  html += "</ul>";
  document.getElementById("chances").innerHTML = html;
}

showChances();

document.getElementById("openBoxButton").addEventListener("click", async () => {
    const result = await open("Boxes1");
    let itemName;
    if (result.includes("|")) {
        const parts = result.split("|");
        document.getElementById("itemimg").src = parts[1];
        itemName = parts[0];
    } else {
        itemName = result;
    }
    document.getElementById("itemname").innerText = itemName;
    updatePoints();
});
</script>
</html>
