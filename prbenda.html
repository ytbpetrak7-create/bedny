<!DOCTYPE html>
<html>
<head>
<style>
body{padding:40px;padding-top:20px;}
h1{font-size:24px;margin-bottom:10px;}
.slot-wrap {
  position:relative;
  width:700px;
  height:150px;
  margin:20px auto;
  overflow:hidden;
  border-radius:8px;
  background:rgba(0,0,0,0.4);
  border:2px solid rgba(255,255,255,0.08);
  box-shadow:inset 0 0 40px rgba(0,0,0,0.6);
}
.slot-strip {
  display:flex;
  gap:6px;
  padding:12px 10px;
  position:absolute;
  left:0;
  will-change:transform;
}
.slot-strip .skin-card {
  flex-shrink:0;
  width:100px;
  background:rgba(255,255,255,0.04);
  border-radius:8px;
  padding:8px 4px;
  text-align:center;
}
.slot-strip .skin-card img {
  width:80px;height:80px;
  object-fit:contain;
  display:block;
  margin:0 auto 2px;
}
.slot-strip .skin-card .sname {
  color:#ccc;font-size:10px;line-height:1.1;display:block;word-break:break-word;
}
.slot-strip .skin-card .sprice {
  color:#ff4444;font-size:9px;display:block;
}
.slot-strip .skin-card.winner {
  background:rgba(255,215,0,0.15);
  border:2px solid #ffd700;
  box-shadow:0 0 25px rgba(255,215,0,0.6);
  animation: winGlow 1s ease-in-out infinite alternate;
}
@keyframes winGlow {
  from{box-shadow:0 0 10px rgba(255,215,0,0.3);}
  to{box-shadow:0 0 35px rgba(255,215,0,0.9);}
}
.slot-indicator {
  position:absolute;
  top:-2px;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:14px solid #ffd700;
  filter:drop-shadow(0 0 6px rgba(255,215,0,0.8));
  z-index:3;
  pointer-events:none;
}
.skin-strip {
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
  margin:10px 0;
}
.skin-strip::-webkit-scrollbar { height:6px; }
.skin-strip::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); border-radius:3px; }
.skin-strip::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:3px; }
.skin-card {
  flex-shrink:0;
  width:100px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  padding:8px;
  text-align:center;
  cursor:default;
  transition:transform 0.2s;
}
.skin-card:hover { transform:scale(1.05); background:rgba(255,255,255,0.1); }
.skin-card img {
  width:80px;
  height:80px;
  object-fit:contain;
  display:block;
  margin:0 auto 4px;
}
.skin-card .sname {
  color:#fff;
  font-size:11px;
  line-height:1.2;
  word-break:break-word;
  display:block;
}
.skin-card .sprice {
  color:#ff4444;
  font-size:10px;
  display:block;
  margin-top:2px;
}
#itemname {
  color:#ffd700;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin:10px 0;
  min-height:30px;
}
.open-btn-wrap { text-align:center; }
#openBoxButton {
  padding:15px 50px;
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(135deg,#00ff96,#00cc78);
  border:none;border-radius:15px;
  color:#1a1a2e;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(0,255,150,0.3);
  transition:transform 0.2s;
}
#openBoxButton:hover{transform:scale(1.05);}
#openBoxButton:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.count-wrap { text-align:center; margin-bottom:10px; }
.count-wrap label { color:#aaa; font-size:14px; margin-right:8px; }
#openCount {
  width:60px; padding:6px; border-radius:8px; border:1px solid #555;
  background:#333; color:#fff; font-size:16px; text-align:center;
}
.results-grid {
  display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
  margin:15px 0;
}
.results-grid .skin-card { width:90px; }
.sell-mini {
  display:block;
  margin:4px auto 0;
  padding:3px 8px;
  font-size:10px;
  background:linear-gradient(135deg,#ff4444,#cc0000);
  border:none;border-radius:5px;
  color:#fff;cursor:pointer;
}
</style>
</head>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Boxes1</h1>

<div class="count-wrap">
  <label for="openCount">Počet:</label>
  <select id="openCount">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
</div>
<div class="open-btn-wrap">
  <button type="button" id="openBoxButton">Otevřít</button>
</div>

<div class="slot-wrap" id="slotWrap">
  <div class="slot-strip" id="slotStrip"></div>
  <div class="slot-indicator"></div>
</div>
<p id="itemname"></p>

<div id="resultsContainer"></div>
<div id="itemActions" style="display:none;text-align:center;margin-top:10px;">
  <button onclick="sellCurrentItem()" id="sellBtn" style="padding:10px 25px;background:linear-gradient(135deg,#ff4444,#cc0000);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;margin-right:10px;box-shadow:0 4px 15px rgba(255,68,68,0.3);"></button>
  <button onclick="openAgain()" style="padding:10px 25px;background:linear-gradient(135deg,#00ff96,#00cc78);border:none;border-radius:10px;color:#1a1a2e;font-size:16px;font-weight:bold;cursor:pointer;">Otevřít znova</button>
</div>
<div class="skin-strip" id="skinStrip"></div>

<link rel="stylesheet" href="inventory.css">
<link rel="stylesheet" href="1bed.css">
</body>
<script src="user.js?ver=5"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
}

var lastItemPrice = 0;
var allItems = [];

var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTick() {
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 800 + Math.random() * 400;
  o.type = "square";
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  o.start(); o.stop(audioCtx.currentTime + 0.05);
}

function playWin() {
  var notes = [523, 659, 784, 1047];
  notes.forEach(function(freq, i) {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq;
    o.type = "sine";
    var t = audioCtx.currentTime + i * 0.12;
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  });
}

function playRare() {
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 1200;
  o.type = "sawtooth";
  g.gain.setValueAtTime(0.12, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  o.start(); o.stop(audioCtx.currentTime + 0.5);
}

async function showChances() {
  var result = await getBoxInfo("Boxes1");
  allItems = JSON.parse(result);
  var html = '';
  allItems.forEach(function(item) {
    var img = item.image || '';
    var rareStyle = item.rare ? 'border:2px solid #ff00ff;box-shadow:0 0 10px rgba(255,0,255,0.5);' : '';
    html += '<div class="skin-card" style="' + rareStyle + '">';
    if (img) { html += '<img src="' + img + '" alt="' + item.name + '" loading="lazy">'; }
    else { html += '<div style="width:80px;height:80px;background:rgba(255,255,255,0.1);border-radius:8px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:28px;">🎁</div>'; }
    html += '<span class="sname">' + item.name + '</span>';
    if (item.rare) { html += '<span style="color:#ff00ff;font-size:9px;">★ RARE</span>'; }
    html += '<span class="sprice">' + Number(item.sellPrice).toFixed(2) + ' Kč</span>';
    html += '</div>';
  });
  document.getElementById("skinStrip").innerHTML = html;
}

showChances();

function buildSlotStrip(winnerName, winnerImg, winnerPrice, rareMode) {
  var strip = document.getElementById("slotStrip");
  var pool = rareMode ? allItems.filter(function(x) { return x.rare; }) : allItems.filter(function(x) { return !x.rare; });
  if (pool.length === 0) pool = allItems;
  var items = [];
  for (var i = 0; i < 35; i++) {
    var item = pool[Math.floor(Math.random() * pool.length)];
    items.push(item);
  }
  var winnerIndex = 28 + Math.floor(Math.random() * 4);
  items[winnerIndex] = { name: winnerName, image: winnerImg, sellPrice: winnerPrice };
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var img = item.image || '';
    var isWinner = (i === winnerIndex);
    html += '<div class="skin-card' + (isWinner ? ' winner' : '') + '">';
    if (img) { html += '<img src="' + img + '" alt="' + item.name + '">'; }
    else { html += '<div style="width:80px;height:80px;background:rgba(255,255,255,0.1);border-radius:8px;margin:0 auto 2px;display:flex;align-items:center;justify-content:center;font-size:24px;">🎁</div>'; }
    html += '<span class="sname">' + item.name + '</span>';
    html += '<span class="sprice">' + Number(item.sellPrice).toFixed(2) + ' Kč</span>';
    html += '</div>';
  }
  strip.innerHTML = html;
  return { winnerIndex: winnerIndex, cardWidth: 106 };
}

function animateSlot(winnerIndex, cardWidth) {
  return new Promise(function(resolve) {
    var strip = document.getElementById("slotStrip");
    var wrap = document.getElementById("slotWrap");
    var visibleCards = Math.floor(wrap.offsetWidth / cardWidth);
    var centerOffset = Math.floor(visibleCards / 2);
    var targetPos = winnerIndex - centerOffset;
    var maxX = -(targetPos * cardWidth);
    
    strip.style.transition = "none";
    strip.style.transform = "translateX(0px)";
    void strip.offsetWidth;
    
    strip.style.transition = "transform 2.8s cubic-bezier(0.1, 0.8, 0.05, 1)";
    strip.style.transform = "translateX(" + maxX + "px)";
    
    var lastTickPos = 0;
    var startTime = performance.now();
    var duration = 2800;
    function tickCheck() {
      var elapsed = performance.now() - startTime;
      if (elapsed >= duration) return;
      var progress = elapsed / duration;
      var eased = 1 - Math.pow(1 - progress, 3);
      var currentPos = eased * Math.abs(maxX);
      var cardIndex = Math.floor(currentPos / cardWidth);
      if (cardIndex > lastTickPos) {
        lastTickPos = cardIndex;
        playTick();
      }
      requestAnimationFrame(tickCheck);
    }
    requestAnimationFrame(tickCheck);
    
    setTimeout(function() {
      var winner = strip.querySelector(".winner");
      if (winner) {
        winner.style.transition = "transform 0.3s ease";
        winner.style.transform = "scale(1.1)";
      }
      playWin();
      resolve();
    }, 3000);
  });
}

document.getElementById("openBoxButton").addEventListener("click", async () => {
    document.getElementById("resultsContainer").innerHTML = "";
    document.getElementById("itemActions").style.display = "none";
    document.getElementById("itemname").innerText = "";
    document.getElementById("slotStrip").innerHTML = "";
    document.getElementById("openBoxButton").disabled = true;
    
    var count = parseInt(document.getElementById("openCount").value) || 1;
    var result = count > 1 ? await openMultiple("Boxes1", count) : await open("Boxes1");
    var invPromise = getInventory();
    
    if (count === 1) {
      var parts = result.split("|");
      var itemName = parts[0], itemImg = parts[1] || "", itemPrice = Number(parts[2]) || 0;
      
      var winnerItem = null;
      for (var w = 0; w < allItems.length; w++) {
        if (allItems[w].name === itemName) { winnerItem = allItems[w]; break; }
      }
      var isRare = winnerItem && Number(winnerItem.rare) === 1;
      
      if (isRare) {
        var decoy = allItems.filter(function(x) { return !x.rare; });
        var d = decoy[Math.floor(Math.random() * decoy.length)];
        var info = buildSlotStrip(d.name, d.image || "", d.sellPrice, false);
        await animateSlot(info.winnerIndex, info.cardWidth);
        
        document.getElementById("itemname").innerText = "?? RARE ??";
        document.getElementById("itemname").style.color = "#ff00ff";
        playRare();
        
        var slotWrap = document.getElementById("slotWrap");
        var c4div = document.createElement("div");
        c4div.id = "c4overlay";
        c4div.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;background:rgba(0,0,0,0.7);border-radius:8px;";
        c4div.innerHTML = '<img src="c4.webp" style="width:120px;height:120px;object-fit:contain;animation:c4Pulse 0.4s ease-in-out 3;">';
        slotWrap.appendChild(c4div);
        
        var style = document.createElement("style");
        style.textContent = "@keyframes c4Pulse{0%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.3);filter:brightness(2) saturate(2)}100%{transform:scale(1);filter:brightness(1)}}";
        document.head.appendChild(style);
        
        await new Promise(function(r) { setTimeout(r, 1500); });
        
        var c4el = document.getElementById("c4overlay");
        if (c4el) c4el.remove();
        slotWrap.style.transition = "none";
        slotWrap.style.transform = "translateX(0px)";
        document.getElementById("slotStrip").innerHTML = "";
        
        var info2 = buildSlotStrip(itemName, itemImg, itemPrice, true);
        await animateSlot(info2.winnerIndex, info2.cardWidth);
      } else {
        var info = buildSlotStrip(itemName, itemImg, itemPrice, false);
        await animateSlot(info.winnerIndex, info.cardWidth);
      }
      
      document.getElementById("itemname").innerText = itemName;
      document.getElementById("itemname").style.color = "#ffd700";
      lastItemPrice = itemPrice;
      
      var inv = JSON.parse(await invPromise);
      var found = inv.filter(function(x) { return x.name === itemName; });
      var lastItemRow = found.length > 0 ? found[found.length - 1].row : null;
      
      if (itemPrice > 0 && lastItemRow) {
        document.getElementById("sellBtn").textContent = "Prodat za " + Number(itemPrice).toFixed(2) + " Kč";
        document.getElementById("itemActions").style.display = "block";
      }
    } else {
      var items = result.split(";");
      var html = '<div class="results-grid">';
      var totalValue = 0;
      items.forEach(function(itemStr, idx) {
        var p = itemStr.split("|");
        var name = p[0], img = p[1] || "", price = Number(p[2]) || 0;
        totalValue += price;
        html += '<div class="skin-card">';
        if (img) { html += '<img src="' + img + '" alt="' + name + '" loading="lazy">'; }
        else { html += '<div style="width:80px;height:80px;background:rgba(255,255,255,0.1);border-radius:8px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:28px;">🎁</div>'; }
        html += '<span class="sname">' + name + '</span>';
        html += '<span class="sprice">' + Number(price).toFixed(2) + ' Kč</span>';
        if (price > 0) {
          html += '<button class="sell-mini" data-idx="' + idx + '">Prodat</button>';
        }
        html += '</div>';
      });
      html += '</div>';
      html += '<p style="color:#aaa;text-align:center;font-size:13px;">Celkem: ' + items.length + ' itemů, hodnota ' + totalValue.toFixed(2) + ' Kč</p>';
      document.getElementById("resultsContainer").innerHTML = html;
      
      document.querySelectorAll(".sell-mini").forEach(function(btn) {
        btn.addEventListener("click", async function() {
          var idx = parseInt(this.dataset.idx);
          var parts = items[idx].split("|");
          var name = parts[0], price = Number(parts[2]) || 0;
          if (!price) return;
          var inv = JSON.parse(await getInventory());
          var found = inv.filter(function(x) { return x.name === name; });
          if (found.length === 0) return;
          var row = found[found.length - 1].row;
          var res = await sellItem(row, price);
          if (res === "SOLD") {
            document.getElementById("openBoxButton").click();
          }
        });
      });
    }
    
    document.getElementById("openBoxButton").disabled = false;
    updatePoints();
});

async function sellCurrentItem() {
  if (!lastItemPrice) return;
  var inv = JSON.parse(await getInventory());
  var itemname = document.getElementById("itemname").innerText;
  var found = inv.filter(function(x) { return x.name === itemname; });
  if (found.length === 0) return;
  var row = found[found.length - 1].row;
  var res = await sellItem(row, lastItemPrice);
  if (res === "SOLD") {
    document.getElementById("itemActions").style.display = "none";
    document.getElementById("itemname").innerText = "";
    updatePoints();
  }
}

function openAgain() {
  document.getElementById("resultsContainer").innerHTML = "";
  document.getElementById("itemActions").style.display = "none";
  document.getElementById("itemname").innerText = "";
  document.getElementById("slotStrip").innerHTML = "";
}
</script>
</html>
