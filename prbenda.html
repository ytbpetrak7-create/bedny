<!DOCTYPE html>
<html>
<head>
<style>
body{padding:40px;padding-top:20px;}
h1{font-size:24px;margin-bottom:10px;}
.slot-wrap {
  position:relative;
  width:700px;
  height:150px;
  margin:20px auto;
  overflow:hidden;
  border-radius:8px;
  background:rgba(0,0,0,0.4);
  border:2px solid rgba(255,255,255,0.08);
  box-shadow:inset 0 0 40px rgba(0,0,0,0.6);
}
.slot-strip {
  display:flex;
  gap:6px;
  padding:12px 10px;
  position:absolute;
  left:0;
  will-change:transform;
}
.slot-strip .skin-card {
  flex-shrink:0;
  width:100px;
  background:rgba(255,255,255,0.04);
  border-radius:8px;
  padding:8px 4px;
  text-align:center;
}
.slot-strip .skin-card img {
  width:80px;height:80px;
  object-fit:contain;
  display:block;
  margin:0 auto 2px;
}
.slot-strip .skin-card .sname {
  color:#ccc;font-size:10px;line-height:1.1;display:block;word-break:break-word;
}
.slot-strip .skin-card .sprice {
  color:#ff4444;font-size:9px;display:block;
}
.slot-strip .skin-card.winner {
  background:rgba(255,215,0,0.15);
  border:2px solid #ffd700;
  box-shadow:0 0 25px rgba(255,215,0,0.6);
  animation: winGlow 1s ease-in-out infinite alternate;
}
@keyframes winGlow {
  from{box-shadow:0 0 10px rgba(255,215,0,0.3);}
  to{box-shadow:0 0 35px rgba(255,215,0,0.9);}
}
.slot-indicator {
  position:absolute;
  top:-2px;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:14px solid #ffd700;
  filter:drop-shadow(0 0 6px rgba(255,215,0,0.8));
  z-index:3;
  pointer-events:none;
}
.skin-strip {
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
  margin:10px 0;
}
.skin-strip::-webkit-scrollbar { height:6px; }
.skin-strip::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); border-radius:3px; }
.skin-strip::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:3px; }
.skin-card {
  flex-shrink:0;
  width:100px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  padding:8px;
  text-align:center;
  cursor:default;
  transition:transform 0.2s;
}
.skin-card:hover { transform:scale(1.05); background:rgba(255,255,255,0.1); }
.skin-card img {
  width:80px;
  height:80px;
  object-fit:contain;
  display:block;
  margin:0 auto 4px;
}
.skin-card .sname {
  color:#fff;
  font-size:11px;
  line-height:1.2;
  word-break:break-word;
  display:block;
}
.skin-card .sprice {
  color:#ff4444;
  font-size:10px;
  display:block;
  margin-top:2px;
}
#itemname {
  color:#ffd700;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin:10px 0;
  min-height:30px;
}
.open-btn-wrap { text-align:center; }
#openBoxButton {
  padding:15px 50px;
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(135deg,#00ff96,#00cc78);
  border:none;border-radius:15px;
  color:#1a1a2e;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(0,255,150,0.3);
  transition:transform 0.2s;
}
#openBoxButton:hover{transform:scale(1.05);}
#openBoxButton:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.count-wrap { text-align:center; margin-bottom:10px; }
.count-wrap label { color:#aaa; font-size:14px; margin-right:8px; }
#openCount {
  width:60px; padding:6px; border-radius:8px; border:1px solid #555;
  background:#333; color:#fff; font-size:16px; text-align:center;
}
.multi-slot-wrap {
  display:flex;
  gap:6px;
  justify-content:center;
  margin:15px auto;
  padding:12px;
  background:rgba(0,0,0,0.3);
  border-radius:10px;
  border:2px solid rgba(255,255,255,0.08);
  max-width:700px;
}
.multi-slot-col {
  flex:1;
  max-width:120px;
  height:200px;
  overflow:hidden;
  position:relative;
  border-radius:6px;
  background:rgba(0,0,0,0.3);
}
.multi-slot-col .col-strip {
  position:absolute;
  left:0;right:0;
  will-change:transform;
}
.multi-slot-col .col-strip .skin-card {
  padding:6px 4px;
  text-align:center;
  background:rgba(255,255,255,0.04);
  border-radius:6px;
  margin:4px 6px;
}
.multi-slot-col .col-strip .skin-card img {
  width:60px;height:60px;
  object-fit:contain;
  display:block;
  margin:0 auto 2px;
}
.multi-slot-col .col-strip .skin-card .sname {
  color:#ccc;font-size:9px;line-height:1.1;display:block;
}
.multi-slot-col .col-strip .skin-card.winner {
  background:rgba(255,215,0,0.15);
  border:2px solid #ffd700;
  box-shadow:0 0 15px rgba(255,215,0,0.5);
}
.multi-slot-col .col-indicator {
  position:absolute;
  left:0;right:0;
  top:50%;
  height:76px;
  transform:translateY(-50%);
  border-top:2px solid rgba(255,215,0,0.3);
  border-bottom:2px solid rgba(255,215,0,0.3);
  pointer-events:none;
  z-index:2;
}
.results-grid {
  display:flex; flex-direction:column; gap:8px;
  margin:15px auto;
  max-width:400px;
}
.results-grid .skin-card {
  display:flex; align-items:center; gap:12px;
  width:100%; padding:8px 12px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
  text-align:left;
}
.results-grid .skin-card img {
  width:50px;height:50px;object-fit:contain;flex-shrink:0;
}
.results-grid .skin-card .sname {
  flex:1; color:#fff; font-size:13px; font-weight:bold;
}
.results-grid .skin-card .sprice {
  color:#ff4444; font-size:12px; white-space:nowrap;
}
.sell-mini {
  padding:5px 12px;
  font-size:11px;
  background:linear-gradient(135deg,#ff4444,#cc0000);
  border:none;border-radius:5px;
  color:#fff;cursor:pointer;
  white-space:nowrap;
}
</style>
</head>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Boxes1</h1>

<div class="count-wrap">
  <label for="openCount">Počet:</label>
  <select id="openCount">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
</div>
<div class="open-btn-wrap">
  <button type="button" id="openBoxButton">Otevřít</button>
</div>

<div class="slot-wrap" id="slotWrap">
  <div class="slot-strip" id="slotStrip"></div>
  <div class="slot-indicator"></div>
</div>
<div id="multiSlotWrap" class="multi-slot-wrap" style="display:none;"></div>
<p id="itemname"></p>

<div id="resultsContainer"></div>
<div id="itemActions" style="display:none;text-align:center;margin-top:10px;">
  <button onclick="sellCurrentItem()" id="sellBtn" style="padding:10px 25px;background:linear-gradient(135deg,#ff4444,#cc0000);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;margin-right:10px;box-shadow:0 4px 15px rgba(255,68,68,0.3);"></button>
  <button onclick="openAgain()" style="padding:10px 25px;background:linear-gradient(135deg,#00ff96,#00cc78);border:none;border-radius:10px;color:#1a1a2e;font-size:16px;font-weight:bold;cursor:pointer;">Otevřít znova</button>
</div>
<div class="skin-strip" id="skinStrip"></div>

<link rel="stylesheet" href="inventory.css">
<link rel="stylesheet" href="1bed.css">
</body>
<script src="user.js?ver=3"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
}

var lastItemPrice = 0;
var allItems = [];

async function showChances() {
  var result = await getBoxInfo("Boxes1");
  allItems = JSON.parse(result);
  var html = '';
  allItems.forEach(function(item) {
    var img = item.image || '';
    html += '<div class="skin-card">';
    if (img) { html += '<img src="' + img + '" alt="' + item.name + '" loading="lazy">'; }
    else { html += '<div style="width:80px;height:80px;background:rgba(255,255,255,0.1);border-radius:8px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:28px;">🎁</div>'; }
    html += '<span class="sname">' + item.name + '</span>';
    html += '<span class="sprice">' + item.sellPrice + ' Kč</span>';
    html += '</div>';
  });
  document.getElementById("skinStrip").innerHTML = html;
}

showChances();

function buildSlotStrip(winnerName, winnerImg, winnerPrice) {
  var strip = document.getElementById("slotStrip");
  var items = [];
  for (var i = 0; i < 35; i++) {
    var item = allItems[Math.floor(Math.random() * allItems.length)];
    items.push(item);
  }
  var winnerIndex = 28 + Math.floor(Math.random() * 4);
  items[winnerIndex] = { name: winnerName, image: winnerImg, sellPrice: winnerPrice };
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var img = item.image || '';
    var isWinner = (i === winnerIndex);
    html += '<div class="skin-card' + (isWinner ? ' winner' : '') + '">';
    if (img) { html += '<img src="' + img + '" alt="' + item.name + '">'; }
    else { html += '<div style="width:80px;height:80px;background:rgba(255,255,255,0.1);border-radius:8px;margin:0 auto 2px;display:flex;align-items:center;justify-content:center;font-size:24px;">🎁</div>'; }
    html += '<span class="sname">' + item.name + '</span>';
    html += '<span class="sprice">' + item.sellPrice + ' Kč</span>';
    html += '</div>';
  }
  strip.innerHTML = html;
  return { winnerIndex: winnerIndex, cardWidth: 106 };
}

function animateSlot(winnerIndex, cardWidth) {
  return new Promise(function(resolve) {
    var strip = document.getElementById("slotStrip");
    var wrap = document.getElementById("slotWrap");
    var visibleCards = Math.floor(wrap.offsetWidth / cardWidth);
    var centerOffset = Math.floor(visibleCards / 2);
    var targetPos = winnerIndex - centerOffset;
    var maxX = -(targetPos * cardWidth);
    
    strip.style.transition = "none";
    strip.style.transform = "translateX(0px)";
    void strip.offsetWidth;
    
    strip.style.transition = "transform 2.8s cubic-bezier(0.1, 0.8, 0.05, 1)";
    strip.style.transform = "translateX(" + maxX + "px)";
    
    setTimeout(function() {
      var winner = strip.querySelector(".winner");
      if (winner) {
        winner.style.transition = "transform 0.3s ease";
        winner.style.transform = "scale(1.1)";
      }
      resolve();
    }, 3000);
  });
}

document.getElementById("openBoxButton").addEventListener("click", async () => {
    document.getElementById("resultsContainer").innerHTML = "";
    document.getElementById("itemActions").style.display = "none";
    document.getElementById("itemname").innerText = "";
    document.getElementById("slotStrip").innerHTML = "";
    document.getElementById("openBoxButton").disabled = true;
    
    var count = parseInt(document.getElementById("openCount").value) || 1;
    var result = count > 1 ? await openMultiple("Boxes1", count) : await open("Boxes1");
    
    if (count === 1) {
      var parts = result.split("|");
      var itemName = parts[0], itemImg = parts[1] || "", itemPrice = Number(parts[2]) || 0;
      
      var info = buildSlotStrip(itemName, itemImg, itemPrice);
      await animateSlot(info.winnerIndex, info.cardWidth);
      
      document.getElementById("itemname").innerText = itemName;
      lastItemPrice = itemPrice;
      
      var inv = JSON.parse(await getInventory());
      var found = inv.filter(function(x) { return x.name === itemName; });
      var lastItemRow = found.length > 0 ? found[found.length - 1].row : null;
      
      if (itemPrice > 0 && lastItemRow) {
        document.getElementById("sellBtn").textContent = "Prodat za " + itemPrice + " Kč";
        document.getElementById("itemActions").style.display = "block";
      }
    } else {
      var items = result.split(";");
      var parsed = items.map(function(s) { var p = s.split("|"); return { name: p[0], img: p[1] || "", price: Number(p[2]) || 0 }; });
      
      document.getElementById("slotWrap").style.display = "none";
      var multiWrap = document.getElementById("multiSlotWrap");
      multiWrap.style.display = "flex";
      
      var colHtml = "";
      var cols = [];
      parsed.forEach(function(win, idx) {
        var colItems = [];
        for (var i = 0; i < 20; i++) {
          colItems.push(allItems[Math.floor(Math.random() * allItems.length)]);
        }
        var winIdx = 14 + Math.floor(Math.random() * 4);
        colItems[winIdx] = { name: win.name, image: win.img, sellPrice: win.price };
        cols.push({ winnerIndex: winIdx });
        
        colHtml += '<div class="multi-slot-col" id="col' + idx + '">';
        colHtml += '<div class="col-strip">';
        colItems.forEach(function(it, ii) {
          var isW = (ii === winIdx);
          colHtml += '<div class="skin-card' + (isW ? ' winner' : '') + '">';
          if (it.image) { colHtml += '<img src="' + it.image + '" alt="' + it.name + '">'; }
          else { colHtml += '<div style="width:60px;height:60px;background:rgba(255,255,255,0.1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 2px;">🎁</div>'; }
          colHtml += '<span class="sname">' + it.name + '</span>';
          colHtml += '</div>';
        });
        colHtml += '</div>';
        colHtml += '<div class="col-indicator"></div>';
        colHtml += '</div>';
      });
      multiWrap.innerHTML = colHtml;
      
      await new Promise(function(resolve) {
        var done = 0;
        var totalCols = cols.length;
        cols.forEach(function(col, idx) {
          var strip = document.querySelector("#col" + idx + " .col-strip");
          var cardH = 76;
          var targetY = -(col.winnerIndex * cardH);
          setTimeout(function() {
            strip.style.transition = "none";
            strip.style.transform = "translateY(0px)";
            void strip.offsetWidth;
            strip.style.transition = "transform 2.5s cubic-bezier(0.1, 0.8, 0.05, 1)";
            strip.style.transform = "translateY(" + targetY + "px)";
          }, idx * 150);
        });
        setTimeout(function() {
          document.querySelectorAll(".multi-slot-col .col-strip .winner").forEach(function(w) {
            w.style.transition = "transform 0.3s ease";
            w.style.transform = "scale(1.1)";
          });
          resolve();
        }, 3000 + cols.length * 150);
      });
      
      var totalValue = parsed.reduce(function(s, it) { return s + it.price; }, 0);
      var html = '<div class="results-grid">';
      parsed.forEach(function(it, idx) {
        html += '<div class="skin-card">';
        if (it.img) { html += '<img src="' + it.img + '" alt="' + it.name + '" loading="lazy">'; }
        else { html += '<div style="width:50px;height:50px;background:rgba(255,255,255,0.1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🎁</div>'; }
        html += '<span class="sname">' + it.name + '</span>';
        html += '<span class="sprice">' + it.price + ' Kč</span>';
        if (it.price > 0) {
          html += '<button class="sell-mini" data-idx="' + idx + '">Prodat</button>';
        }
        html += '</div>';
      });
      html += '</div>';
      html += '<p style="color:#aaa;text-align:center;font-size:13px;">Celkem: ' + parsed.length + ' itemů, hodnota ' + totalValue + ' Kč</p>';
      document.getElementById("resultsContainer").innerHTML = html;
      
      document.querySelectorAll(".sell-mini").forEach(function(btn) {
        btn.addEventListener("click", async function() {
          var idx = parseInt(this.dataset.idx);
          var it = parsed[idx];
          if (!it.price) return;
          var inv = JSON.parse(await getInventory());
          var found = inv.filter(function(x) { return x.name === it.name; });
          if (found.length === 0) return;
          var row = found[found.length - 1].row;
          var res = await sellItem(row, it.price);
          if (res === "SOLD") {
            document.getElementById("openBoxButton").click();
          }
        });
      });
    }
    
    document.getElementById("openBoxButton").disabled = false;
    updatePoints();
});

async function sellCurrentItem() {
  if (!lastItemPrice) return;
  var inv = JSON.parse(await getInventory());
  var itemname = document.getElementById("itemname").innerText;
  var found = inv.filter(function(x) { return x.name === itemname; });
  if (found.length === 0) return;
  var row = found[found.length - 1].row;
  var res = await sellItem(row, lastItemPrice);
  if (res === "SOLD") {
    document.getElementById("itemActions").style.display = "none";
    document.getElementById("itemname").innerText = "";
    updatePoints();
  }
}

function openAgain() {
  document.getElementById("resultsContainer").innerHTML = "";
  document.getElementById("itemActions").style.display = "none";
  document.getElementById("itemname").innerText = "";
  document.getElementById("slotStrip").innerHTML = "";
  document.getElementById("slotWrap").style.display = "block";
  document.getElementById("multiSlotWrap").style.display = "none";
}
</script>
</html>
