<!DOCTYPE html>
<html>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Boxes1</h1>

<button class="open" type="button" id="openBoxButton">otevri</button>
<img id="itemimg">
<p id="itemname"></p>
<div id="itemActions" style="display:none;margin-top:10px;">
  <button onclick="sellCurrentItem()" id="sellBtn" style="padding:10px 25px;background:linear-gradient(135deg,#ff4444,#cc0000);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;margin-right:10px;"></button>
  <button onclick="openAgain()" style="padding:10px 25px;background:linear-gradient(135deg,#00ff96,#00cc78);border:none;border-radius:10px;color:#1a1a2e;font-size:16px;font-weight:bold;cursor:pointer;">Otevřít znova</button>
</div>
<div id="chances"></div>

<link rel="stylesheet" href="inventory.css">
<link rel="stylesheet" href="1bed.css">
<style>body{padding:40px;padding-top:20px;} h1{font-size:24px;margin-bottom:10px;}</style>
</body>
<script src="user.js?ver=3"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
}

var lastItemRow = null;
var lastItemPrice = 0;

async function showChances() {
  var result = await getBoxInfo("Boxes1");
  var items = JSON.parse(result);
  var total = items.reduce(function(sum, item) { return sum + item.chance; }, 0);
  var html = '<h3 style="color:#0f0;font-size:14px;margin:5px 0 2px;">Šance:</h3><ul style="color:#fff;font-size:12px;list-style:none;padding:0;margin:0;">';
  items.forEach(function(item) {
    var pct = ((item.chance / total) * 100).toFixed(1);
    var odds = Math.round(total / item.chance);
    html += '<li style="padding:1px 0;">' + item.name + ': ' + pct + '% (1 z ' + odds + ') <span style="color:#ff4444;">' + item.sellPrice + ' bodů</span></li>';
  });
  html += "</ul>";
  document.getElementById("chances").innerHTML = html;
}

showChances();

document.getElementById("openBoxButton").addEventListener("click", async () => {
    document.getElementById("itemActions").style.display = "none";
    const result = await open("Boxes1");
    let itemName, itemImg, itemPrice;
    var parts = result.split("|");
    itemName = parts[0];
    itemImg = parts[1] || "";
    itemPrice = Number(parts[2]) || 0;
    document.getElementById("itemimg").src = itemImg;
    document.getElementById("itemname").innerText = itemName;
    
    lastItemPrice = itemPrice;
    
    var inv = JSON.parse(await getInventory());
    var found = inv.filter(function(x) { return x.name === itemName; });
    lastItemRow = found.length > 0 ? found[found.length - 1].row : null;
    
    if (itemPrice > 0 && lastItemRow) {
      document.getElementById("sellBtn").textContent = "Prodat za " + itemPrice + " bodů";
      document.getElementById("itemActions").style.display = "block";
    }
    updatePoints();
});

async function sellCurrentItem() {
  if (!lastItemRow) return;
  var res = await sellItem(lastItemRow, lastItemPrice);
  if (res === "SOLD") {
    alert("Item prodán za " + lastItemPrice + " bodů");
    document.getElementById("itemActions").style.display = "none";
    document.getElementById("itemimg").src = "";
    document.getElementById("itemname").innerText = "";
    updatePoints();
  }
}

function openAgain() {
  document.getElementById("itemActions").style.display = "none";
  document.getElementById("itemimg").src = "";
  document.getElementById("itemname").innerText = "";
}
</script>
</html>
