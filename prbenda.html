<!DOCTYPE html>
<html>
<head>
<style>
body{padding:40px;padding-top:20px;}
h1{font-size:24px;margin-bottom:10px;}
.box-container {
  position:relative;
  width:200px;height:200px;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
}
#boxCrate {
  width:160px;height:160px;
  background:linear-gradient(135deg,#8B4513,#D2691E);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:all 0.5s ease;
}
#boxCrate.spin {
  animation: spin 0.8s ease-in-out infinite;
}
.skin-strip {
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
  margin:10px 0;
}
.skin-strip::-webkit-scrollbar { height:6px; }
.skin-strip::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); border-radius:3px; }
.skin-strip::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:3px; }
.skin-card {
  flex-shrink:0;
  width:100px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  padding:8px;
  text-align:center;
  cursor:default;
  transition:transform 0.2s;
}
.skin-card:hover { transform:scale(1.05); background:rgba(255,255,255,0.1); }
.skin-card img {
  width:80px;
  height:80px;
  object-fit:contain;
  display:block;
  margin:0 auto 4px;
}
.skin-card .sname {
  color:#fff;
  font-size:11px;
  line-height:1.2;
  word-break:break-word;
  display:block;
}
.skin-card .sprice {
  color:#ff4444;
  font-size:10px;
  display:block;
  margin-top:2px;
}
#boxCrate.reveal {
  animation: reveal 0.6s ease-out forwards;
}
@keyframes spin {
  0%{transform:rotate(0deg) scale(1);}
  25%{transform:rotate(90deg) scale(1.05);}
  50%{transform:rotate(180deg) scale(1);}
  75%{transform:rotate(270deg) scale(1.05);}
  100%{transform:rotate(360deg) scale(1);}
}
@keyframes reveal {
  0%{transform:scale(0) rotate(720deg);opacity:0;}
  60%{transform:scale(1.2) rotate(-10deg);opacity:1;}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
#itemimg {
  max-width:180px;max-height:180px;
  border-radius:15px;
  display:none;
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  from{opacity:0;transform:scale(0.5);}
  to{opacity:1;transform:scale(1);}
}
#itemname {
  color:#fff;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin:10px 0;
}
.open-btn-wrap { text-align:center; }
#openBoxButton {
  padding:15px 50px;
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(135deg,#00ff96,#00cc78);
  border:none;border-radius:15px;
  color:#1a1a2e;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(0,255,150,0.3);
  transition:transform 0.2s;
}
#openBoxButton:hover{transform:scale(1.05);}
#openBoxButton:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.count-wrap { text-align:center; margin-bottom:10px; }
.count-wrap label { color:#aaa; font-size:14px; margin-right:8px; }
#openCount {
  width:60px; padding:6px; border-radius:8px; border:1px solid #555;
  background:#333; color:#fff; font-size:16px; text-align:center;
}
.results-grid {
  display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
  margin:15px 0;
}
.results-grid .skin-card { width:90px; }
</style>
</head>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Boxes1</h1>

<div class="open-btn-wrap">
  <button type="button" id="openBoxButton">Otevřít</button>
</div>
<div class="count-wrap">
  <label for="openCount">Počet:</label>
  <select id="openCount">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
</div>
<div class="box-container">
  <div id="boxCrate">📦</div>
  <img id="itemimg">
</div>
<p id="itemname"></p>
<div id="resultsContainer"></div>
<div id="itemActions" style="display:none;text-align:center;margin-top:10px;">
  <button onclick="sellCurrentItem()" id="sellBtn" style="padding:10px 25px;background:linear-gradient(135deg,#ff4444,#cc0000);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;margin-right:10px;box-shadow:0 4px 15px rgba(255,68,68,0.3);"></button>
  <button onclick="openAgain()" style="padding:10px 25px;background:linear-gradient(135deg,#00ff96,#00cc78);border:none;border-radius:10px;color:#1a1a2e;font-size:16px;font-weight:bold;cursor:pointer;">Otevřít znova</button>
</div>
<div class="skin-strip" id="skinStrip"></div>

<link rel="stylesheet" href="inventory.css">
<link rel="stylesheet" href="1bed.css">
</body>
<script src="user.js?ver=3"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
}

var lastItemPrice = 0;

async function showChances() {
  var result = await getBoxInfo("Boxes1");
  var items = JSON.parse(result);
  var html = '';
  items.forEach(function(item) {
    var img = item.image || '';
    html += '<div class="skin-card">';
    if (img) { html += '<img src="' + img + '" alt="' + item.name + '" loading="lazy">'; }
    else { html += '<div style="width:80px;height:80px;background:rgba(255,255,255,0.1);border-radius:8px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:28px;">🎁</div>'; }
    html += '<span class="sname">' + item.name + '</span>';
    html += '<span class="sprice">' + item.sellPrice + ' Kč</span>';
    html += '</div>';
  });
  document.getElementById("skinStrip").innerHTML = html;
}

showChances();

document.getElementById("openBoxButton").addEventListener("click", async () => {
    document.getElementById("resultsContainer").innerHTML = "";
    document.getElementById("itemActions").style.display = "none";
    document.getElementById("itemimg").style.display = "none";
    document.getElementById("itemname").innerText = "";
    var crate = document.getElementById("boxCrate");
    crate.style.display = "flex";
    crate.textContent = "📦";
    crate.className = "spin";
    document.getElementById("openBoxButton").disabled = true;
    
    var count = parseInt(document.getElementById("openCount").value) || 1;
    var result = count > 1 ? await openMultiple("Boxes1", count) : await open("Boxes1");
    
    crate.className = "";
    
    if (count === 1) {
      let itemName, itemImg, itemPrice;
      var parts = result.split("|");
      itemName = parts[0];
      itemImg = parts[1] || "";
      itemPrice = Number(parts[2]) || 0;
      
      if (itemImg) {
        crate.style.display = "none";
        document.getElementById("itemimg").src = itemImg;
        document.getElementById("itemimg").style.display = "block";
        document.getElementById("itemimg").className = "";
        void document.getElementById("itemimg").offsetWidth;
        document.getElementById("itemimg").className = "reveal";
      } else {
        crate.textContent = itemName.charAt(0).toUpperCase();
        crate.style.background = "linear-gradient(135deg,#6f42c1,#9b59b6)";
        crate.className = "reveal";
      }
      document.getElementById("itemname").innerText = itemName;
      
      lastItemPrice = itemPrice;
      
      var inv = JSON.parse(await getInventory());
      var found = inv.filter(function(x) { return x.name === itemName; });
      var lastItemRow = found.length > 0 ? found[found.length - 1].row : null;
      
      if (itemPrice > 0 && lastItemRow) {
        document.getElementById("sellBtn").textContent = "Prodat za " + itemPrice + " Kč";
        document.getElementById("itemActions").style.display = "block";
      }
    } else {
      var items = result.split(";");
      var html = '<div class="results-grid">';
      var totalValue = 0;
      items.forEach(function(itemStr) {
        var p = itemStr.split("|");
        var name = p[0], img = p[1] || "", price = Number(p[2]) || 0;
        totalValue += price;
        html += '<div class="skin-card">';
        if (img) { html += '<img src="' + img + '" alt="' + name + '" loading="lazy">'; }
        else { html += '<div style="width:80px;height:80px;background:rgba(255,255,255,0.1);border-radius:8px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:28px;">🎁</div>'; }
        html += '<span class="sname">' + name + '</span>';
        html += '<span class="sprice">' + price + ' Kč</span>';
        html += '</div>';
      });
      html += '</div>';
      html += '<p style="color:#aaa;text-align:center;font-size:13px;">Celkem: ' + items.length + ' itemů, hodnota ' + totalValue + ' Kč</p>';
      document.getElementById("resultsContainer").innerHTML = html;
      crate.style.display = "none";
    }
    
    document.getElementById("openBoxButton").disabled = false;
    updatePoints();
});

async function sellCurrentItem() {
  if (!lastItemPrice) return;
  var inv = JSON.parse(await getInventory());
  var itemname = document.getElementById("itemname").innerText;
  var found = inv.filter(function(x) { return x.name === itemname; });
  if (found.length === 0) return;
  var row = found[found.length - 1].row;
  var res = await sellItem(row, lastItemPrice);
  if (res === "SOLD") {
    alert("Prodáno za " + lastItemPrice + " Kč");
    document.getElementById("itemActions").style.display = "none";
    document.getElementById("itemimg").style.display = "none";
    document.getElementById("boxCrate").style.display = "flex";
    document.getElementById("boxCrate").textContent = "📦";
    document.getElementById("boxCrate").className = "";
    document.getElementById("itemname").innerText = "";
    updatePoints();
  }
}

function openAgain() {
  document.getElementById("resultsContainer").innerHTML = "";
  document.getElementById("itemActions").style.display = "none";
  document.getElementById("itemimg").style.display = "none";
  var crate = document.getElementById("boxCrate");
  crate.style.display = "flex";
  crate.textContent = "📦";
  crate.className = "";
  document.getElementById("itemname").innerText = "";
}
</script>
</html>
