<!DOCTYPE html>
<html>
<body>
<button class="open" type="button" id="openBoxButton">otevri</button>

<img id="itemimg">
<p id="itemname"></p>

<link rel="stylesheet" href="1bed.css">
</body>
<script src="user.js?ver=2"></script>
<script>
createPointsDisplay();
document.getElementById("openBoxButton").addEventListener("click", async () => {
    const result = await open("Boxes1");
    if (result.includes("|")) {
        const parts = result.split("|");
        document.getElementById("itemimg").src = parts[1];
        document.getElementById("itemname").innerText = parts[0];
    } else {
        document.getElementById("itemname").innerText = result;
    }
    updatePoints();
});
</script>
</html>
