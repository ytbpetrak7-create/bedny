<script src="user.js"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
  checkAdmin();
  loadProfilePic();
}

async function loadProfilePic() {
  var res = await getProfile();
  if (res === "NOT_FOUND") return;
  var data = JSON.parse(res);
  if (data.profilePic) {
    var pic = document.getElementById("profilePic");
    if (pic) {
      pic.style.background = "url('" + data.profilePic + "') center/cover";
      pic.textContent = "";
    }
  }
}

async function checkAdmin() {
  var res = await isAdmin();
  if (res === "YES") {
    var a = document.createElement("a");
    a.href = "admin.html";
    a.id = "adminLink";
    a.textContent = "Admin";
    a.style.cssText = "position:fixed;bottom:20px;right:20px;color:#fff;background:#f80;padding:10px 20px;text-decoration:none;z-index:9999;font-size:16px;border-radius:5px;";
    document.body.appendChild(a);
  }
}
</script>
</body>
