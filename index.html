<!DOCTYPE html>
<html>
<head>
  <title>Přihlášení</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="container">
    <h1>Bedny</h1>
    <div id="loginForm">
      <h2>Přihlášení</h2>
      <button class="steam-btn" onclick="steamLogin()" style="padding:15px 50px;background:linear-gradient(135deg,#1b2838,#2a475e);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;cursor:pointer;margin:20px 0;">Přihlásit se přes Steam</button>
    </div>
  </div>

  <script>
    function steamLogin() {
      var base = "https://ytbpetrak7-create.github.io/bedny/";
      var returnTo = base + "callback.html";
      var steamUrl = "https://steamcommunity.com/openid/login?" +
        "openid.ns=" + encodeURIComponent("http://specs.openid.net/auth/2.0") +
        "&openid.mode=" + encodeURIComponent("checkid_setup") +
        "&openid.return_to=" + encodeURIComponent(returnTo) +
        "&openid.realm=" + encodeURIComponent(base) +
        "&openid.identity=" + encodeURIComponent("http://specs.openid.net/auth/2.0/identifier_select") +
        "&openid.claimed_id=" + encodeURIComponent("http://specs.openid.net/auth/2.0/identifier_select");
      window.location.href = steamUrl;
    }
  </script>
</body>
</html>
