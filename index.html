<!DOCTYPE html>
<html>
<head>
  <title>Přihlášení</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="container">
    <h1>Bedny</h1>
    
    <div id="loginForm">
      <h2>Přihlášení</h2>
      <input type="text" id="loginUsername" placeholder="Uživatelské jméno">
      <input type="password" id="loginPassword" placeholder="Heslo">
      <span onclick="togglePassword('loginPassword', this)" style="cursor:pointer;user-select:none;">👁️</span>
      <button onclick="handleLogin()">Přihlásit se</button>
      <button class="steam-btn" onclick="steamLogin()">Přihlásit se přes Steam</button>
      <p class="switch">Nemáš účet? <a href="#" onclick="showRegister()">Registrace</a></p>
    </div>

    <div id="registerForm" style="display: none;">
      <h2>Registrace</h2>
      <input type="text" id="regUsername" placeholder="Uživatelské jméno">
      <input type="password" id="regPassword" placeholder="Heslo">
      <span onclick="togglePassword('regPassword', this)" style="cursor:pointer;user-select:none;">👁️</span>
      <input type="password" id="regPasswordConfirm" placeholder="Potvrď heslo">
      <button onclick="handleRegister()">Registrovat se</button>
      <p class="switch">Máš účet? <a href="#" onclick="showLogin()">Přihlášení</a></p>
    </div>
  </div>

  <script src="user.js"></script>
  <script>
    function steamLogin() {
      var base = "https://ytbpetrak7-create.github.io/bedny/";
      var returnTo = base + "callback.html";
      var steamUrl = "https://steamcommunity.com/openid/login?" +
        "openid.ns=" + encodeURIComponent("http://specs.openid.net/auth/2.0") +
        "&openid.mode=" + encodeURIComponent("checkid_setup") +
        "&openid.return_to=" + encodeURIComponent(returnTo) +
        "&openid.realm=" + encodeURIComponent(base) +
        "&openid.identity=" + encodeURIComponent("http://specs.openid.net/auth/2.0/identifier_select") +
        "&openid.claimed_id=" + encodeURIComponent("http://specs.openid.net/auth/2.0/identifier_select");
      window.location.href = steamUrl;
    }
    function togglePassword(id, el) {
      var input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        el.textContent = "🙈";
      } else {
        input.type = "password";
        el.textContent = "👁️";
      }
    }

    function showRegister() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "block";
    }

    function showLogin() {
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
    }

    async function handleLogin() {
      var username = document.getElementById("loginUsername").value.trim();
      var password = document.getElementById("loginPassword").value.trim();
      const result = await login(username, password);
      if (result === "OK") {
        setCurrentUser(username);
        window.location.href = "hlav.html";
      } else {
        alert("Špatné jméno nebo heslo");
      }
    }

    async function handleRegister() {
      var username = document.getElementById("regUsername").value.trim();
      var password = document.getElementById("regPassword").value;
      var confirm = document.getElementById("regPasswordConfirm").value;
      if (!username || !password) {
        alert("Vyplň jméno a heslo");
        return;
      }
      if (password !== confirm) {
        alert("Hesla se neshodují");
        return;
      }
      try {
        const result = await register(username, password);
        alert("Odpověď: " + result);
        if (result === "OK") {
          setCurrentUser(username);
          window.location.href = "hlav.html";
        } else {
          alert("Registrace selhala: " + result);
        }
      } catch (e) {
        alert("Chyba spojení: " + e.message);
      }
    }
  </script>
</body>
</html>
