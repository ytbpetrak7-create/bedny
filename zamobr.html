<!DOCTYPE html>
<html>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Zamořit body</h1>

<div style="text-align:center;margin-bottom:20px;">
  <button onclick="showTab('code')" id="tabCode" style="padding:10px 30px;background:#00ff96;border:none;border-radius:10px 0 0 10px;color:#1a1a2e;font-size:16px;font-weight:bold;cursor:pointer;">Kód</button>
  <button onclick="showTab('skin')" id="tabSkin" style="padding:10px 30px;background:#444;border:none;border-radius:0 10px 10px 0;color:#fff;font-size:16px;cursor:pointer;">Skin</button>
</div>

<div id="codeTab">
  <p>Zadej kód níže</p>
  <input class="intex" type="text" id="kod">
  <input class="inok" type="button" value="ok" id="ok-button" onclick="overitkod()">
</div>

<div id="skinTab" style="display:none;">
  <p>Pošli skin botovi přes Steam Trade</p>
  <div id="tradeInfo"></div>
  <button onclick="openTrade()" id="tradeBtn" style="padding:15px 40px;background:linear-gradient(135deg,#1b2838,#2a475e);border:none;border-radius:10px;color:#c6d4df;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px;">Otevřít trade</button>
  <p style="font-size:13px;color:#ff8800;margin-top:15px;">⚠️ Do zprávy trade nabídky napiš své <b>uživatelské jméno</b>!</p>
  <p style="font-size:12px;color:#aaa;margin-top:5px;">Bot automaticky přepočítá skiny na Kč a připíše ti je na účet</p>
</div>

<link rel="stylesheet" href="zam obr.css">
<link rel="stylesheet" href="inventory.css">
<link rel="stylesheet" href="1bed.css">
</body>
<script src="script.js"></script>
<script src="user.js?ver=5"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
  loadTradeLink();
}

function showTab(tab) {
  document.getElementById("codeTab").style.display = tab === "code" ? "block" : "none";
  document.getElementById("skinTab").style.display = tab === "skin" ? "block" : "none";
  document.getElementById("tabCode").style.background = tab === "code" ? "#00ff96" : "#444";
  document.getElementById("tabCode").style.color = tab === "code" ? "#1a1a2e" : "#fff";
  document.getElementById("tabSkin").style.background = tab === "skin" ? "#00ff96" : "#444";
  document.getElementById("tabSkin").style.color = tab === "skin" ? "#1a1a2e" : "#fff";
}

async function loadTradeLink() {
  var botLink = await callScript("getBotTradeLink");
  var info = document.getElementById("tradeInfo");
  if (botLink && botLink !== "NOT_SET") {
    info.innerHTML = '<p style="color:#aaa;font-size:14px;">Bot trade link: <a href="' + botLink + '" target="_blank" style="color:#00ff96;">otevřít trade</a></p>';
    document.getElementById("tradeBtn").onclick = function() { window.open(botLink, "_blank"); };
  } else {
    info.innerHTML = '<p style="color:#f80;font-size:14px;">Bot trade link není nastaven, kontaktuj admina</p>';
    document.getElementById("tradeBtn").disabled = true;
    document.getElementById("tradeBtn").style.opacity = "0.5";
  }
}

function openTrade() {
  var btn = document.getElementById("tradeBtn");
  btn.textContent = "Otevřeno";
  btn.style.background = "#00cc78";
}
</script>
</html>
