<!DOCTYPE html>
<html>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Inventář</h1>
<div id="inventory"></div>

<link rel="stylesheet" href="1bed.css">
<link rel="stylesheet" href="inventory.css">
</body>
<script src="user.js?ver=3"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
}

var priceMap = {};

async function loadPrices() {
  var info = await getBoxInfo("Boxes1");
  var items = JSON.parse(info);
  items.forEach(function(x) { priceMap[x.name] = x.sellPrice || 0; });
}

async function loadInventory() {
  await loadPrices();
  var result = await getInventory();
  var items = JSON.parse(result);
  var container = document.getElementById("inventory");
  
  if (items.length === 0) {
    container.innerHTML = "<p>Zatím nemáš žádné předměty</p>";
    return;
  }
  
  container.innerHTML = "";
  items.forEach(function(item) {
    var div = document.createElement("div");
    div.className = "inventory-item";
    var price = priceMap[item.name] || 0;
    var btns = "<button onclick='removeItem(\"" + item.name + "\"," + item.row + ")' style='background:#f44;color:#fff;border:none;border-radius:5px;padding:4px 10px;cursor:pointer;'>X</button>";
    if (price > 0) {
      btns += " <button onclick='sellFromInv(" + item.row + ",\"" + item.name + "\"," + price + ")' style='background:#ff4444;color:#fff;border:none;border-radius:5px;padding:4px 10px;cursor:pointer;'>Prodat za " + price + "</button>";
    }
    div.innerHTML = "<p>" + item.name + "</p><span>" + new Date(item.date).toLocaleDateString() + "</span> " + btns;
    container.appendChild(div);
  });
}

async function removeItem(name, row) {
  if (!confirm("Smazat " + name + " z inventáře?")) return;
  var res = await deleteInventoryItem(name, row);
  if (res === "DELETED") {
    loadInventory();
  } else {
    alert("Chyba: " + res);
  }
}

async function sellFromInv(row, name, price) {
  if (!confirm("Prodat " + name + " za " + price + " Kč?")) return;
  var res = await sellItem(row, price);
  if (res === "SOLD") {
    loadInventory();
  } else {
    alert("Chyba: " + res);
  }
}

loadInventory();
</script>
</html>
