<!DOCTYPE html>
<html>
<head>
<style>
body{padding:40px;padding-top:20px;}
h1{font-size:24px;margin-bottom:10px;}
.inventory-item {
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  padding:10px 15px;
  margin-bottom:8px;
}
.inventory-item img {
  width:64px;height:64px;
  object-fit:contain;
  border-radius:6px;
}
.inventory-item .info {
  flex:1;
}
.inventory-item .info .name {
  color:#fff;font-size:15px;font-weight:bold;
}
.inventory-item .info .date {
  color:#888;font-size:11px;
}
.inventory-item .actions {
  display:flex;gap:6px;flex-shrink:0;
}
.inventory-item .actions button {
  border:none;border-radius:6px;padding:6px 12px;
  font-size:12px;cursor:pointer;white-space:nowrap;
}
.btn-sell { background:linear-gradient(135deg,#ff4444,#cc0000);color:#fff; }
.btn-steam { background:linear-gradient(135deg,#1b2838,#2a475e);color:#fff;display:inline-flex;align-items:center;padding:6px 12px;border-radius:6px;font-size:12px;text-decoration:none;cursor:pointer; }
.btn-withdraw { background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;display:inline-flex;align-items:center;padding:6px 12px;border-radius:6px;font-size:12px;text-decoration:none;cursor:pointer; }
.btn-del { background:#555;color:#fff; }
</style>
</head>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Inventář</h1>
<div id="sellAllWrap" style="margin-bottom:15px;"></div>
<div id="inventory"></div>

<link rel="stylesheet" href="1bed.css">
<link rel="stylesheet" href="inventory.css">
</body>
<script src="user.js?ver=6"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
}

var itemMap = {};
var adminTradeLink = "";
var userTradeLink = "";

async function loadData() {
  var results = await Promise.all([
    getBoxInfo("Boxes1"),
    getBoxInfo("Boxes2"),
    getAdminTradeLink(),
    getProfile()
  ]);
  JSON.parse(results[0]).forEach(function(x) { itemMap[x.name] = { price: x.sellPrice || 0, image: x.image || "" }; });
  JSON.parse(results[1]).forEach(function(x) { if (!itemMap[x.name]) itemMap[x.name] = { price: x.sellPrice || 0, image: x.image || "" }; });
  adminTradeLink = results[2];
  var pd = JSON.parse(results[3]);
  userTradeLink = pd.tradeLink || "";
}

async function loadInventory() {
  var dataPromise = loadData();
  var invPromise = getInventory();
  await dataPromise;
  var result = await invPromise;
  var items = JSON.parse(result);
  var container = document.getElementById("inventory");
  
  if (items.length === 0) {
    container.innerHTML = "<p style='color:#aaa;'>Zatím nemáš žádné předměty</p>";
    return;
  }
  
  container.innerHTML = "";
  renderSellAll(items);
  items.forEach(function(item) {
    var data = itemMap[item.name] || { price: 0, image: "" };
    var img = data.image;
    var price = data.price;
    var div = document.createElement("div");
    div.className = "inventory-item";
    
    var imgHtml = img ? '<img src="' + img + '" alt="' + item.name + '" loading="lazy">' : '<div style="width:64px;height:64px;background:rgba(255,255,255,0.1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">🎁</div>';
    
    var actions = '<div class="actions">';
    if (price > 0) {
      actions += '<button class="btn-sell" onclick="sellFromInv(' + item.row + ',\'' + item.name + '\',' + price + ')">Prodat ' + Number(price).toFixed(2) + ' Kč</button>';
    }
    if (userTradeLink) {
      actions += '<button class="btn-withdraw" onclick="requestWithdraw(\'' + item.name + '\',' + item.row + ')">Vyzvednout</button>';
    }
    actions += '</div>';
    
    div.innerHTML = imgHtml + '<div class="info"><div class="name">' + item.name + '</div><div class="date">' + new Date(item.date).toLocaleDateString() + '</div></div>' + actions;
    container.appendChild(div);
  });
}

async function requestWithdraw(itemName, row) {
  if (!confirm("Vyzvednout " + itemName + "?")) return;
  var uname = getCurrentUser();
  var res = await callScript("requestWithdraw", { username: uname, itemName: itemName, row: row });
  if (res === "WITHDRAW_REQUESTED") {
    loadInventory();
  } else {
    alert("Chyba: " + res);
  }
}

async function removeItem(name, row) {
  if (!confirm("Smazat " + name + " z inventáře?")) return;
  var res = await deleteInventoryItem(name, row);
  if (res === "DELETED") {
    loadInventory();
  } else {
    alert("Chyba: " + res);
  }
}

async function sellFromInv(row, name, price) {
  if (!confirm("Prodat " + name + " za " + Number(price).toFixed(2) + " Kč?")) return;
  var res = await sellItem(row, price);
  if (res === "SOLD") {
    loadInventory();
  } else {
    alert("Chyba: " + res);
  }
}

async function sellAll() {
  var result = await getInventory();
  var items = JSON.parse(result);
  var toSell = [];
  var total = 0;
  items.forEach(function(item) {
    var data = itemMap[item.name] || { price: 0 };
    if (data.price > 0) {
      toSell.push({ row: item.row, name: item.name, price: data.price });
      total += data.price;
    }
  });
  if (toSell.length === 0) { alert("Žádné prodejné předměty"); return; }
  if (!confirm("Prodat " + toSell.length + " předmětů za " + total.toFixed(2) + " Kč?")) return;
  for (var i = 0; i < toSell.length; i++) {
    await sellItem(toSell[i].row, toSell[i].price);
  }
  loadInventory();
  updatePoints();
}

function renderSellAll(items) {
  var total = 0;
  var count = 0;
  items.forEach(function(item) {
    var data = itemMap[item.name] || { price: 0 };
    if (data.price > 0) { total += data.price; count++; }
  });
  var wrap = document.getElementById("sellAllWrap");
  if (count > 0) {
    wrap.innerHTML = '<button onclick="sellAll()" style="padding:10px 25px;background:linear-gradient(135deg,#ff4444,#cc0000);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;">Prodat vše (' + count + ' za ' + total.toFixed(2) + ' Kč)</button>';
  } else {
    wrap.innerHTML = "";
  }
}

loadInventory();
</script>
</html>
