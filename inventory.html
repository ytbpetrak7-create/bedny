<!DOCTYPE html>
<html>
<body>
<a href="hlav.html" class="back-link">← Zpět</a>
<h1>Inventář</h1>
<div id="inventory"></div>

<link rel="stylesheet" href="1bed.css">
<link rel="stylesheet" href="inventory.css">
</body>
<script src="user.js?ver=3"></script>
<script>
if (!getCurrentUser()) {
  window.location.href = "index.html";
} else {
  createPointsDisplay();
}

async function loadInventory() {
  var result = await getInventory();
  var items = JSON.parse(result);
  var container = document.getElementById("inventory");
  
  if (items.length === 0) {
    container.innerHTML = "<p>Zatím nemáš žádné předměty</p>";
    return;
  }
  
  items.forEach(function(item) {
    var div = document.createElement("div");
    div.className = "inventory-item";
    div.innerHTML = "<p>" + item.name + "</p><span>" + new Date(item.date).toLocaleDateString() + "</span> <button onclick='removeItem(\"" + item.name + "\"," + item.row + ")' style='background:#f44;color:#fff;border:none;border-radius:5px;padding:4px 10px;cursor:pointer;'>X</button>";
    container.appendChild(div);
  });
}

async function removeItem(name, row) {
  if (!confirm("Smazat " + name + " z inventáře?")) return;
  var res = await deleteInventoryItem(name, row);
  if (res === "DELETED") {
    loadInventory();
  } else {
    alert("Chyba: " + res);
  }
}

loadInventory();
</script>
</html>
