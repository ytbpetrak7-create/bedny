<!DOCTYPE html>
<html>
<body>
<script src="user.js"></script>
<script>
(async function() {
  var claimedId = new URLSearchParams(window.location.search).get("openid.claimed_id") || "";
  var steamId = claimedId.substring(claimedId.lastIndexOf("/") + 1);
  if (!steamId) {
    document.write("<p>Chyba: Steam ID nenalezeno</p>");
    return;
  }

  var res = await callScript("steamLoginComplete", { steamId: steamId });
  if (res.indexOf("|") > -1) {
    var parts = res.split("|");
    localStorage.setItem("username", parts[0]);
    if (parts[1]) localStorage.setItem("steamPic", parts[1]);
    window.location.href = "hlav.html";
  } else {
    document.write("<p>Chyba: " + res + "</p>");
  }
})();
</script>
</body>
</html>
